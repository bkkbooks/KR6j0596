body:
  text: 西天譯經三藏朝散大夫試光祿卿明教大師臣法賢奉詔譯如是我聞一時佛在舍衛國祇樹給孤獨園與大比丘衆千二百五十人俱復有諸菩薩摩訶薩衆金剛手而為上首爾時世尊告金剛手菩薩大祕密主言如汝本部號金剛部於持明藏中最上甚深祕密之法衆生淺識根器狹劣於祕密義難信難解汝已先說難信解法汝不依法非曰聖人得名不善亦曰難調金剛手我今於汝金剛部中略說汝之祕密八名及陀羅尼是陀羅尼若持誦者於諸所求易得成就若人聞此陀羅尼經發至誠心受持讀誦者是人所有無間罪業悉皆消滅持是經時法威力故所有八萬四千俱胝那由他諸惡魔衆退散馳走十方世界若人聞此陀羅尼歡喜願樂者是人不持戒者得戒完具非梵行者得成梵行非寂靜者得成寂靜乃至得見諸佛菩薩歡喜安慰施所求願令得成就爾時金剛手菩薩蒙佛誨責頭面作禮白言世尊我先所說誠如聖旨唯願世尊不捨大悲普為現在及與未來一切衆生宣說於我八種祕密名字及陀羅尼令諸衆生獲大利益佛告金剛手言諦聽諦聽我於最勝持明藏金剛部中說汝祕密八名一名象耳二名妙莊嚴三名功德寶海四名無動五名真實雲六名可愛色相七名焰光八名妙色金剛手此即是汝祕密八名即說陀羅尼曰那謨引沒馱引野一那謨引達哩摩二合野二那謨引僧伽引野三那謨引嚩日囉二合播引拏野四怛𭔞他引五遏致引六渴囉致引七蘇引摩目契八薩哩囉二合哥引哩也二合尼娑引達野九呬哩十彌哩十一嘻尼十二悉殿覩滿怛囉二合鉢那引莎引賀引十三佛告金剛手菩薩言如是祕密名及陀羅尼若復有人受持讀誦者是人於七俱胝那由他百千劫不墮地獄臨命終時諸佛菩薩現身面前安慰說法命終之後生兜率陀天佛說是經已金剛手菩薩等諸菩薩及一切世間天人阿修羅乾闥婆人非人等聞佛所說皆大歡喜信受奉行
